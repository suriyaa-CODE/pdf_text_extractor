<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PDF Text Extractor</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f2eb;
    --surface: #fdfcf8;
    --ink: #1a1712;
    --ink2: #6b6455;
    --ink3: #a89e92;
    --accent: #c9452a;
    --accent-light: #f5ebe8;
    --border: rgba(26,23,18,0.12);
    --border-strong: rgba(26,23,18,0.22);
    --mono: 'DM Mono', monospace;
    --serif: 'Fraunces', serif;
  }

  body {
    font-family: var(--mono);
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 2.5rem 3rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 1.5rem;
    flex-wrap: wrap;
  }

  .logo {
    font-family: var(--serif);
    font-size: 1.8rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--ink);
  }

  .logo span {
    color: var(--accent);
    font-style: italic;
  }

  .tagline {
    font-size: 0.72rem;
    color: var(--ink3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: 0;
  }

  .panel-left {
    padding: 2.5rem 3rem;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 2rem;
  }

  .panel-right {
    padding: 2.5rem 3rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .section-label {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 0.75rem;
  }

  /* Drop zone */
  .drop-zone {
    border: 1.5px dashed var(--border-strong);
    border-radius: 12px;
    padding: 3rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s ease;
    background: var(--surface);
    position: relative;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-light);
  }

  .drop-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .drop-icon {
    font-size: 2.5rem;
    margin-bottom: 1rem;
    display: block;
    color: var(--ink3);
    transition: color 0.2s;
  }

  .drop-zone:hover .drop-icon,
  .drop-zone.drag-over .drop-icon {
    color: var(--accent);
  }

  .drop-title {
    font-family: var(--serif);
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 0.4rem;
  }

  .drop-sub {
    font-size: 0.72rem;
    color: var(--ink3);
    letter-spacing: 0.04em;
  }

  /* File info card */
  .file-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem 1.5rem;
    display: none;
    gap: 1rem;
    align-items: center;
  }

  .file-card.visible { display: flex; }

  .file-icon-wrap {
    width: 44px;
    height: 44px;
    border-radius: 8px;
    background: var(--accent-light);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .file-icon-wrap svg { width: 22px; height: 22px; stroke: var(--accent); fill: none; stroke-width: 1.8; }

  .file-meta { flex: 1; min-width: 0; }
  .file-name { font-size: 0.82rem; font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-size { font-size: 0.7rem; color: var(--ink3); margin-top: 2px; }

  /* Progress */
  .progress-wrap { display: none; flex-direction: column; gap: 0.6rem; }
  .progress-wrap.visible { display: flex; }

  .progress-header { display: flex; justify-content: space-between; align-items: center; }
  .progress-label { font-size: 0.72rem; color: var(--ink2); }
  .progress-pct { font-size: 0.72rem; color: var(--accent); font-weight: 500; }

  .progress-bar-bg {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.15s ease;
  }

  .progress-pages { font-size: 0.68rem; color: var(--ink3); }

  /* Extract button */
  .btn-extract {
    font-family: var(--mono);
    font-size: 0.78rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--surface);
    background: var(--ink);
    border: none;
    border-radius: 8px;
    padding: 0.8rem 1.5rem;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
    display: none;
  }

  .btn-extract:hover { background: var(--accent); }
  .btn-extract.visible { display: block; }
  .btn-extract:disabled { opacity: 0.4; cursor: not-allowed; background: var(--ink); }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.75rem;
    display: none;
  }

  .stats-row.visible { display: grid; }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.85rem 1rem;
    text-align: center;
  }

  .stat-num {
    font-family: var(--serif);
    font-size: 1.4rem;
    font-weight: 600;
    color: var(--ink);
    display: block;
  }

  .stat-lbl { font-size: 0.62rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink3); margin-top: 2px; display: block; }

  /* Output area */
  .output-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .output-actions { display: flex; gap: 0.5rem; }

  .btn-sm {
    font-family: var(--mono);
    font-size: 0.68rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink2);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.4rem 0.85rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }

  .output-box {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem;
    overflow-y: auto;
    font-size: 0.78rem;
    line-height: 1.8;
    color: var(--ink);
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 300px;
    resize: none;
    font-family: var(--mono);
    max-height: calc(100vh - 280px);
  }

  .output-box:focus { outline: none; }

  .placeholder-text {
    color: var(--ink3);
    font-style: italic;
    text-align: center;
    margin-top: 4rem;
    font-family: var(--serif);
    font-size: 1rem;
    font-weight: 300;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: var(--surface);
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    padding: 0.6rem 1.4rem;
    border-radius: 100px;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s ease;
    white-space: nowrap;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Error state */
  .error-msg {
    font-size: 0.72rem;
    color: var(--accent);
    background: var(--accent-light);
    border-radius: 6px;
    padding: 0.6rem 0.9rem;
    display: none;
  }

  .error-msg.visible { display: block; }

  @media (max-width: 760px) {
    main { grid-template-columns: 1fr; }
    .panel-left { border-right: none; border-bottom: 1px solid var(--border); }
    header { padding: 1.5rem; }
    .panel-left, .panel-right { padding: 1.5rem; }
    .output-box { max-height: 400px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">PDF<span>extract</span></div>
  <div class="tagline">Client-side · any size · no upload</div>
</header>

<main>
  <div class="panel-left">
    <div>
      <p class="section-label">01 — Load file</p>
      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept=".pdf" />
        <span class="drop-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" style="width:40px;height:40px;display:block;margin:0 auto;">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="12" y1="18" x2="12" y2="12"/>
            <polyline points="9 15 12 12 15 15"/>
          </svg>
        </span>
        <div class="drop-title">Drop your PDF here</div>
        <div class="drop-sub">or click to browse &nbsp;·&nbsp; any size supported</div>
      </div>
    </div>

    <div class="file-card" id="fileCard">
      <div class="file-icon-wrap">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      </div>
      <div class="file-meta">
        <div class="file-name" id="fileName">—</div>
        <div class="file-size" id="fileSize">—</div>
      </div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div>
      <p class="section-label">02 — Extract</p>
      <button class="btn-extract" id="extractBtn">Extract text</button>
    </div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-header">
        <span class="progress-label" id="progressLabel">Processing pages…</span>
        <span class="progress-pct" id="progressPct">0%</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
      <div class="progress-pages" id="progressPages"></div>
    </div>

    <div class="stats-row" id="statsRow">
      <div class="stat-card">
        <span class="stat-num" id="statPages">—</span>
        <span class="stat-lbl">Pages</span>
      </div>
      <div class="stat-card">
        <span class="stat-num" id="statWords">—</span>
        <span class="stat-lbl">Words</span>
      </div>
      <div class="stat-card">
        <span class="stat-num" id="statChars">—</span>
        <span class="stat-lbl">Chars</span>
      </div>
    </div>
  </div>

  <div class="panel-right">
    <div class="output-header">
      <p class="section-label" style="margin:0">03 — Extracted text</p>
      <div class="output-actions">
        <button class="btn-sm" id="copyBtn">Copy</button>
        <button class="btn-sm" id="downloadBtn">Download .txt</button>
      </div>
    </div>

    <textarea class="output-box" id="outputBox" readonly spellcheck="false"><span class="placeholder-text">Your extracted text will appear here…</span></textarea>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const fileCard = document.getElementById('fileCard');
const fileName = document.getElementById('fileName');
const fileSize = document.getElementById('fileSize');
const extractBtn = document.getElementById('extractBtn');
const progressWrap = document.getElementById('progressWrap');
const progressLabel = document.getElementById('progressLabel');
const progressPct = document.getElementById('progressPct');
const progressFill = document.getElementById('progressFill');
const progressPages = document.getElementById('progressPages');
const statsRow = document.getElementById('statsRow');
const outputBox = document.getElementById('outputBox');
const copyBtn = document.getElementById('copyBtn');
const downloadBtn = document.getElementById('downloadBtn');
const errorMsg = document.getElementById('errorMsg');
const toast = document.getElementById('toast');

let currentFile = null;
let extractedText = '';

function fmtSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
}

function fmtNum(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return n.toString();
}

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2200);
}

function showError(msg) {
  errorMsg.textContent = msg;
  errorMsg.classList.add('visible');
}

function clearError() {
  errorMsg.classList.remove('visible');
  errorMsg.textContent = '';
}

function loadFile(file) {
  if (!file || file.type !== 'application/pdf') {
    showError('Please select a valid PDF file.');
    return;
  }
  clearError();
  currentFile = file;
  fileName.textContent = file.name;
  fileSize.textContent = fmtSize(file.size);
  fileCard.classList.add('visible');
  extractBtn.classList.add('visible');
  statsRow.classList.remove('visible');
  progressWrap.classList.remove('visible');
  outputBox.value = '';
  outputBox.style.color = '';
  extractedText = '';
}

fileInput.addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});

dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('drag-over');
});

dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));

dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) loadFile(file);
});

extractBtn.addEventListener('click', async () => {
  if (!currentFile) return;

  extractBtn.disabled = true;
  extractBtn.textContent = 'Extracting…';
  progressWrap.classList.add('visible');
  statsRow.classList.remove('visible');
  clearError();

  try {
    const arrayBuffer = await currentFile.arrayBuffer();

    const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer });
    const pdf = await loadingTask.promise;
    const totalPages = pdf.numPages;

    let fullText = '';
    const CHUNK = 10;

    for (let i = 1; i <= totalPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      const pageText = content.items.map(item => item.str).join(' ');
      fullText += `\n\n--- Page ${i} ---\n\n${pageText}`;

      const pct = Math.round((i / totalPages) * 100);
      progressFill.style.width = pct + '%';
      progressPct.textContent = pct + '%';
      progressPages.textContent = `Page ${i} of ${totalPages}`;

      if (i % CHUNK === 0) await new Promise(r => setTimeout(r, 0));
    }

    extractedText = fullText.trim();
    outputBox.value = extractedText;

    const words = extractedText.split(/\s+/).filter(Boolean).length;
    const chars = extractedText.length;

    document.getElementById('statPages').textContent = totalPages;
    document.getElementById('statWords').textContent = fmtNum(words);
    document.getElementById('statChars').textContent = fmtNum(chars);
    statsRow.classList.add('visible');

    progressLabel.textContent = 'Done!';
    progressPct.textContent = '100%';
    showToast('Extraction complete ✓');

  } catch (err) {
    showError('Failed to read PDF: ' + (err.message || 'Unknown error'));
    progressWrap.classList.remove('visible');
  }

  extractBtn.disabled = false;
  extractBtn.textContent = 'Extract text';
});

copyBtn.addEventListener('click', () => {
  if (!extractedText) { showToast('Nothing to copy yet.'); return; }
  navigator.clipboard.writeText(extractedText).then(() => showToast('Copied to clipboard!'));
});

downloadBtn.addEventListener('click', () => {
  if (!extractedText) { showToast('Nothing to download yet.'); return; }
  const blob = new Blob([extractedText], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const baseName = currentFile ? currentFile.name.replace(/\.pdf$/i, '') : 'extracted';
  a.download = baseName + '_text.txt';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Downloaded!');
});
</script>
</body>
</html>
